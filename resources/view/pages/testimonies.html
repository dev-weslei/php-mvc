<h1>View de depoimentos</h1>
<section id="testimonies">
    {{itens}}
    {{pagination}}
</section>
<hr>
<section id="form">
    <h3>Envie seu depoimento:</h3>
   <!-- action="" -> caso seja omitido a requisicao sera enviada para a URL da pagina atual, porem, utilizando outro metodo (neste caso POST) -->
    <form method="post" action="?page=1">
        <div class="form-group">
            <label for="">Nome:</label>
            <input class="form-control" type="text" name="nome" id="" required>
        </div>
        <div class="form-group">
            <label for="">Depoimento:</label>
            <textarea rows="5" class="form-control" name="mensagem" id="" required>
            </textarea>
        </div>
        <div class="form-group mt-3">
            <button type="submit" class="btn btn-success">
                Enviar
            </button>
        </div>
    </form>
</section>
