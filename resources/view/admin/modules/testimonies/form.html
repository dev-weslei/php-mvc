<h1>{{title}}</h1>
<p>Depoimentos enviados pelos usuários</p>
<hr>
<a href="{{URL}}/admin/testimonies">
    <button class="btn btn-warning" type="button">
        Voltar
    </button>
</a>
<hr>
{{status}}
<form method="post">
    <div class="form-group">
        <label>Nome</label>
        <input type="text" name="nome" id="" class="form-control" value="{{nome}}" required>
    </div>
    <div class="form-group my-3">
        <label>Mensagem</label>
        <textarea name="mensagem" id="" rows="5" class="form-control" required>{{mensagem}}</textarea>
    </div>
    <div class="form-group">
        <button type="submit" class="btn btn-success">
            Enviar
        </button>
    </div>
</form>
